model:
  hidden_dim: 64
  num_layers: 3
  num_heads: 4
  dropout: 0.1
  use_q_attention: true
  use_error_token: true
training:
  batch_size: 4
  epochs: 80
  optimizer: adamw
  lr: 0.0005
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_epochs: 5
loss:
  lambda_listmle: 0.35
  lambda_listnet: 0.15
  lambda_topk: 0.4
  lambda_reg: 0.1
  topk_k: 10
  topk_weight: 8.0
logging:
  eval_every: 1
  ckpt_dir: experiments/models
  log_dir: experiments/logs
  monitor_metric: topk_precision@10
